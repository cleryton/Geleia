name: Build Garmin Watch Face
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download SDK
        run: |
          wget --no-check-certificate \
          "https://developer.garmin.com/downloads/connect-iq/[LATEST_VERSION]/connectiq-sdk-lin-[LATEST_VERSION].zip" \
          -O sdk.zip
          unzip -q sdk.zip -d sdk

      - name: Generate developer key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in developer_key.pem -out developer_key.der -nocrypt

      - name: Compile watch face
        run: |
          cd sdk
          java -jar bin/monkeybrains.jar \
            -o ../Geleia.prg \
            -f ../monkey.jungle \
            -y ../developer_key.der \
            -d fr55 \
            -r

      - name: Upload PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
