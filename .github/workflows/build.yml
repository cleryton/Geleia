name: Build Garmin Watch Face

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Connect IQ SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip
          unzip -q sdk.zip
          ls -la
          find . -name "monkeyc.jar" 2>/dev/null

      - name: Generate Developer Key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt

      - name: Build Watch Face
        run: |
          # Encontra o monkeyc.jar automaticamente
          MONKEYC_JAR=$(find . -name "monkeyc.jar" 2>/dev/null | head -1)
          echo "Using: $MONKEYC_JAR"
          
          java -Xms512m -Xmx1g -Dfile.encoding=UTF-8 \
            -jar "$MONKEYC_JAR" \
            -o Geleia.prg \
            -f monkey.jungle \
            -y developer_key.der \
            -d fr55 \
            -r

      - name: Upload PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
