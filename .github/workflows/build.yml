name: Investigate SDK Structure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  investigate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip

      - name: Extract SDK
        run: |
          unzip -o sdk.zip
          echo "=== Estrutura de diretórios ==="
          find . -type d | head -30
          echo "=== Arquivos .xml ==="
          find . -name "*.xml"
          echo "=== Arquivos contendo 'device' ==="
          find . -name "*device*"

      - name: Try to list devices using monkeybrains.jar
        run: |
          echo "=== Tentando listar dispositivos com -d ? -o /dev/null ==="
          java -jar bin/monkeybrains.jar -d ? -o /dev/null 2>&1 || true
          echo "=== Tentando listar com --help ==="
          java -jar bin/monkeybrains.jar --help 2>&1 | head -50
