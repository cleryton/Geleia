name: Build Garmin Watch Face
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip
          unzip -q sdk.zip -d sdk

      - name: Generate Key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in developer_key.pem -out developer_key.der -nocrypt

     - name: Build Watch Face
       run: |
        chmod +x sdk/bin/monkeyc
        sdk/bin/monkeyc \
        --output Geleia.prg \
        --private-key developer_key.der \
        --manifest manifest.xml \
        --device fenix6pro \
        --jungles monkey.jungle \
        --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
