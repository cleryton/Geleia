name: Build Garmin Watch Face (SDK 8.4.2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'  # SDK 8 funciona bem com Java 11

      - name: Download SDK 8.4.2
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-8.4.2-2025-09-17-8a7b3c5d.zip" -O sdk.zip
          unzip -q sdk.zip -d sdk_temp
          mv sdk_temp/connectiq-sdk-* sdk
          ls -la sdk/bin/

      - name: Generate developer key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt

      - name: Compile with SDK 8.4.2
        run: |
          java -jar sdk/bin/monkeyc.jar -o Geleia.prg -f monkey.jungle -y developer_key.der -d fr55 -r

      - name: Upload PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
