name: Build Garmin Watch Face

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip
          unzip -q sdk.zip
          chmod +x bin/monkeyc bin/monkeybrains.jar

      - name: Generate developer key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt

      - name: Compile (tentativa com diferentes IDs)
        id: compile
        continue-on-error: true
        run: |
          # Lista de possíveis IDs para o Forerunner 55
          DEVICES=("fr55" "forerunner55" "fr55_standard" "fr55_android" "fr55m" "fr55_hr")
          for DEV in "${DEVICES[@]}"; do
            echo "Tentando dispositivo: $DEV"
            if java -jar bin/monkeybrains.jar -o Geleia.prg -f monkey.jungle -y developer_key.der -d "$DEV" -r; then
              echo "SUCESSO com $DEV"
              echo "device=$DEV" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "Falha com $DEV"
            fi
          done
          # Se nenhum funcionar, usa o simulador
          echo "Tentando compilar para o simulador (-d sim)"
          java -jar bin/monkeybrains.jar -o Geleia.prg -f monkey.jungle -y developer_key.der -d sim -r
          echo "device=sim" >> $GITHUB_OUTPUT

      - name: Upload PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
