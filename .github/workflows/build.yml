name: Build Garmin Watch Face
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip
          unzip -q sdk.zip -d sdk

      - name: List valid device IDs
        run: |
          java -jar sdk/bin/monkeybrains.jar -d invalid_device_to_list 2>&1 | grep -i "valid\|device\|fr\|runner" | head -30

      - name: Generate Key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt

      - name: Build
        run: |
          java -Xms512m -Xmx1g -Dfile.encoding=UTF-8 \
            -jar sdk/bin/monkeybrains.jar \
            -o Geleia.prg \
            -f monkey.jungle \
            -y developer_key.der \
            -d forerunner55 \
            -r

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
