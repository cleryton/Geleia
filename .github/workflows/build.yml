name: Build Garmin Watch Face
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download Connect IQ SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip
          ls -lh sdk.zip
          unzip -q sdk.zip -d sdk
          ls sdk/
          
      - name: Find device ID
        run: |
          find sdk/share -name "*.xml" | head -5
          ls sdk/share/
          find sdk/share -name "*.json" | head -5
          find sdk -name "devices.xml" | head -5

      - name: Generate Developer Key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt

      - name: Build Watch Face
        run: |
          java -Xms512m -Xmx1g -Dfile.encoding=UTF-8 \
            -jar sdk/bin/monkeybrains.jar \
            -o Geleia.prg \
            -f monkey.jungle \
            -y developer_key.der \
            -d forerunner55 \
            -r

      - name: Upload PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
