name: List Garmin Devices

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip

      - name: Extract SDK
        run: |
          unzip -o sdk.zip

      - name: List all devices
        run: |
          echo "=== TODOS OS DISPOSITIVOS DISPONÍVEIS ==="
          java -jar bin/monkeybrains.jar -d ? 2>&1 | tee device_list.txt
          echo "========================================="
          echo "Buscando por '55' ou 'forerunner':"
          grep -i "55\|forerunner" device_list.txt || echo "Nenhum dispositivo com '55' encontrado."

      - name: Upload device list
        uses: actions/upload-artifact@v4
        with:
          name: device-list
          path: device_list.txt
