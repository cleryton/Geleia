name: Build Garmin Watch Face

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip

      - name: Extract SDK
        run: |
          unzip -o sdk.zip

      - name: List available devices
        run: |
          echo "=== Lista de dispositivos ==="
          java -jar bin/monkeybrains.jar -d ? 2>&1 | head -100

      - name: Generate developer key
        run: |
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt

      - name: Compile watch face
        run: |
          # Use o nome correto após identificar. Enquanto isso, vamos tentar um placeholder
          # Você vai substituir XXXX pelo nome correto que aparecer na listagem.
          java -jar bin/monkeybrains.jar \
            -o Geleia.prg \
            -f monkey.jungle \
            -y developer_key.der \
            -d XXXX \
            -r

      - name: Upload PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geleia-watchface
          path: Geleia.prg
