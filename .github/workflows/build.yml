name: List Garmin Devices

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SDK
        run: |
          wget --no-check-certificate "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-9.1.0-2026-03-09-6a872a80b.zip" -O sdk.zip

      - name: Extract SDK
        run: |
          unzip -o sdk.zip

      - name: Search for Forerunner 55 in devices.xml
        run: |
          echo "=== Dispositivos encontrados no devices.xml ==="
          grep -i "fr55\|forerunner55\|forerunner 55" bin/devices.xml || echo "Nenhum dispositivo com '55' encontrado."
          echo "=== Todos os IDs de dispositivo (primeiros 30) ==="
          grep -o 'id="[^"]*"' bin/devices.xml | head -30
